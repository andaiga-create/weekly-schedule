<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AS & CLAIM 주간 스케줄 (2026)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px 40px;
            border-bottom: 4px solid #ffd700;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px 40px;
            border-bottom: 4px solid #ffd700;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .filters {
            background: #f8f9fa;
            padding: 25px 40px;
            border-bottom: 2px solid #e9ecef;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-group label {
            font-size: 13px;
            font-weight: 600;
            color: #495057;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-group select {
            padding: 10px 16px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 14px;
            min-width: 200px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-group select:hover {
            border-color: #667eea;
        }

        .filter-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .stats {
            background: white;
            padding: 20px 40px;
            display: flex;
            gap: 30px;
            border-bottom: 1px solid #e9ecef;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .stat-icon.total {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .stat-icon.week {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }

        .stat-text {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 12px;
            color: #6c757d;
            font-weight: 500;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #212529;
        }

        .content {
            padding: 40px;
        }

        .week-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .week-title {
            font-size: 24px;
            font-weight: 700;
        }

        .week-range {
            font-size: 14px;
            opacity: 0.9;
        }

        .schedule-grid {
            display: grid;
            gap: 20px;
        }

        .schedule-card {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .schedule-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
        }

        .schedule-card:hover {
            border-color: #667eea;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e9ecef;
        }

        .card-date {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .date-main {
            font-size: 20px;
            font-weight: 700;
            color: #212529;
        }

        .date-week {
            font-size: 12px;
            color: #6c757d;
            font-weight: 500;
        }

        .card-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge.as {
            background: #e3f2fd;
            color: #1976d2;
        }

        .badge.claim {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .badge.free {
            background: #e8f5e9;
            color: #388e3c;
        }

        .badge.paid {
            background: #fff3e0;
            color: #f57c00;
        }

        .card-body {
            display: grid;
            gap: 16px;
        }

        .info-row {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 12px;
            align-items: start;
        }

        .info-label {
            font-size: 13px;
            font-weight: 600;
            color: #6c757d;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-label::before {
            content: '';
            width: 4px;
            height: 4px;
            background: #667eea;
            border-radius: 50%;
        }

        .info-value {
            font-size: 14px;
            color: #212529;
            line-height: 1.6;
        }

        .info-value.highlight {
            font-weight: 600;
            color: #667eea;
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }

        .no-data-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .no-data-text {
            font-size: 18px;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .filters {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-group select {
                min-width: 100%;
            }

            .stats {
                flex-direction: column;
                gap: 15px;
            }

            .info-row {
                grid-template-columns: 1fr;
                gap: 6px;
            }

            .header h1 {
                font-size: 24px;
            }
        }

        @keyframes highlight {
            0%, 100% {
                box-shadow: 0 8px 24px rgba(102, 126, 234, 0.2);
                transform: translateY(0);
            }
            50% {
                box-shadow: 0 12px 32px rgba(102, 126, 234, 0.4);
                transform: translateY(-4px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ AS & CLAIM 주간 스케줄</h1>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label>📅 주차 선택</label>
                <select id="weekFilter">
                    <option value="">전체 주차</option>
                </select>
            </div>
            <div class="filter-group">
                <label>👤 담당자</label>
                <select id="managerFilter">
                    <option value="">전체 담당자</option>
                </select>
            </div>
            <div class="filter-group">
                <label>🏭 외주</label>
                <select id="vendorFilter">
                    <option value="">전체 외주</option>
                </select>
            </div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-icon total">📊</div>
                <div class="stat-text">
                    <span class="stat-label">총 일정</span>
                    <span class="stat-value" id="totalCount">0</span>
                </div>
            </div>
            <div class="stat-item">
                <div class="stat-icon week">📌</div>
                <div class="stat-text">
                    <span class="stat-label">금주 일정</span>
                    <span class="stat-value" id="weekCount">0</span>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="week-header" id="weekHeader">
                <div class="week-title" id="weekTitle">전체 스케줄</div>
                <div class="week-range" id="weekRange"></div>
            </div>
            <div class="schedule-grid" id="scheduleGrid">
                <div class="no-data">
                    <div class="no-data-icon">📋</div>
                    <div class="no-data-text">데이터를 불러오는 중...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 전역 변수
        let allSchedules = [];
        let filteredSchedules = [];

        // GitHub에서 Excel 파일 자동 로드
        async function loadExcelFromGitHub() {
            try {
                // 캐시 방지를 위한 타임스탬프 추가
                const timestamp = new Date().getTime();
                const response = await fetch(`as_claim_weekly.xlsx?t=${timestamp}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const arrayBuffer = await response.arrayBuffer();
                
                if (arrayBuffer.byteLength === 0) {
                    throw new Error('파일이 비어있습니다.');
                }
                
                const data = new Uint8Array(arrayBuffer);
                const workbook = XLSX.read(data, { type: 'array' });
                
                console.log('워크북 시트:', workbook.SheetNames); // 디버깅용
                
                // 첫 번째 시트 읽기 - header: 1로 원본 배열 형태로 읽기
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const rawData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                
                console.log('첫 5행 원본 데이터:', rawData.slice(0, 5));
                
                // 헤더 행 찾기 (보통 첫 번째 또는 두 번째 행)
                let headerRowIndex = -1;
                for (let i = 0; i < Math.min(5, rawData.length); i++) {
                    const row = rawData[i];
                    if (row && row.length > 0 && 
                        (row.includes('주') || row.includes('일자') || row.includes('구분'))) {
                        headerRowIndex = i;
                        console.log(`헤더 발견: ${i}번째 행`, row);
                        break;
                    }
                }
                
                if (headerRowIndex === -1) {
                    throw new Error('Excel 파일에서 헤더를 찾을 수 없습니다.');
                }
                
                // 헤더를 기준으로 다시 파싱
                const jsonData = XLSX.utils.sheet_to_json(firstSheet, { 
                    range: headerRowIndex,
                    defval: ''
                });
                
                console.log('파싱된 데이터 샘플:', jsonData[0]);
                console.log('읽은 데이터 개수:', jsonData.length);
                
                if (jsonData.length === 0) {
                    throw new Error('Excel 파일에 데이터가 없습니다.');
                }
                
                // 데이터 변환 및 처리
                processExcelData(jsonData);
                
                console.log(`✅ ${jsonData.length}개의 일정을 불러왔습니다.`);
            } catch (error) {
                console.error('Excel 파일 읽기 오류:', error);
                document.getElementById('scheduleGrid').innerHTML = `
                    <div class="no-data">
                        <div class="no-data-icon">❌</div>
                        <div class="no-data-text">파일을 불러오는 중 오류가 발생했습니다</div>
                        <div style="margin-top: 10px; font-size: 13px; color: #6c757d;">
                            ${error.message}<br><br>
                            • as_claim_weekly.xlsx 파일이 같은 경로에 있는지 확인해주세요<br>
                            • 브라우저 콘솔(F12)에서 자세한 오류를 확인하세요
                        </div>
                    </div>
                `;
            }
        }

        // 날짜로부터 주차 계산 (YYYY년 N주 형식)
        function getWeekFromDate(dateStr) {
            const date = new Date(dateStr);
            const year = date.getFullYear();
            
            // 해당 연도의 1월 1일
            const yearStart = new Date(year, 0, 1);
            
            // 1월 1일부터 해당 날짜까지의 일수
            const daysDiff = Math.floor((date - yearStart) / (24 * 60 * 60 * 1000));
            
            // 주차 계산 (1월 1일이 속한 주를 1주로)
            const weekNumber = Math.ceil((daysDiff + yearStart.getDay() + 1) / 7);
            
            return `${weekNumber}주`;
        }

        // Excel 데이터 처리 및 변환
        function processExcelData(jsonData) {
            console.log('========== 데이터 처리 시작 ==========');
            console.log('원본 데이터 샘플:', jsonData[0]); // 디버깅용
            console.log('원본 데이터 전체 개수:', jsonData.length);
            
            // 컬럼명 확인
            if (jsonData.length > 0) {
                console.log('Excel 컬럼명 목록:', Object.keys(jsonData[0]));
            }
            
            allSchedules = jsonData.map((item, index) => {
                // Excel 날짜를 JavaScript 날짜로 변환
                let dateStr = item['일자'];
                
                // 첫 5개 항목만 상세 로그
                if (index < 5) {
                    console.log(`[${index}] 원본 일자:`, dateStr, '타입:', typeof dateStr);
                }
                
                if (typeof dateStr === 'number') {
                    // Excel 날짜 시리얼 번호를 날짜로 변환
                    const excelDate = new Date((dateStr - 25569) * 86400 * 1000);
                    const year = excelDate.getFullYear();
                    const month = String(excelDate.getMonth() + 1).padStart(2, '0');
                    const day = String(excelDate.getDate()).padStart(2, '0');
                    dateStr = `${year}-${month}-${day}`;
                    if (index < 5) {
                        console.log(`[${index}] 변환된 날짜:`, dateStr);
                    }
                } else if (dateStr && typeof dateStr === 'string') {
                    // 문자열 날짜 처리
                    if (dateStr.includes('/')) {
                        // "YYYY/MM/DD" 형식을 "YYYY-MM-DD"로 변환
                        dateStr = dateStr.replace(/\//g, '-');
                    } else if (dateStr.includes(' ')) {
                        // "YYYY-MM-DD HH:MM:SS" 형식에서 날짜 부분만 추출
                        dateStr = dateStr.split(' ')[0];
                    }
                    if (index < 5) {
                        console.log(`[${index}] 문자열 날짜:`, dateStr);
                    }
                } else {
                    // 날짜가 없는 경우에도 로그
                    if (index < 5) {
                        console.log(`[${index}] 날짜 없음 - null 처리`);
                    }
                    dateStr = null;
                }

                return {
                    주: dateStr ? getWeekFromDate(dateStr) : '', // 일자 기준으로 주차 자동 계산
                    일자: dateStr,
                    일자_str: dateStr,
                    구분: item['구분'] || '',
                    인도일: item['인도일'] || '',
                    조선소_장소: item['조선소/장소'] || '',
                    호선: item['호선'] || '',
                    장비: item['장비'] || '',
                    검사종류_고객요청사항: item['검사종류/고객요청사항'] || '',
                    담당자: item['담당자'] || '',
                    외주: item['외주'] || '',
                    유무상: item['유무상'] || '',
                    차량: item['차량'],
                    출장인원: item['출장인원'] || '',
                    비고: item['비고'] || ''
                };
            });
            
            console.log('변환 완료 - 전체 항목:', allSchedules.length);
            
            // 첫 5개 항목의 주차 및 유무상 정보 확인
            console.log('주차 및 유무상 샘플:');
            allSchedules.slice(0, 5).forEach((s, i) => {
                console.log(`  [${i}] 일자: ${s.일자} → 주차: ${s.주}, 유무상: "${s.유무상}" (타입: ${typeof s.유무상})`);
            });
            
            // 필터링: 날짜가 없거나 구분이 빈칸인 항목 제거
            const beforeFilter = allSchedules.length;
            allSchedules = allSchedules.filter(s => {
                // 날짜가 없으면 제외
                if (!s.일자 || s.일자 === null || s.일자 === '') return false;
                // 구분이 빈칸이면 제외
                if (!s.구분 || s.구분 === '') return false;
                return true;
            });
            const afterFilter = allSchedules.length;
            
            console.log(`필터링: ${beforeFilter}개 → ${afterFilter}개 (${beforeFilter - afterFilter}개 제거)`);
            console.log('처리된 데이터 샘플:', allSchedules[0]); // 디버깅용
            console.log('========== 데이터 처리 완료 ==========');

            initializeData();
        }

        // 스케줄 데이터 (기본값 - 빈 배열)
        const scheduleData = [];

        // 날짜 포맷팅 함수
        function formatDate(dateStr) {
            if (!dateStr) return 'Invalid Date';
            
            const date = new Date(dateStr);
            
            // Invalid Date 체크
            if (isNaN(date.getTime())) {
                console.error('잘못된 날짜:', dateStr);
                return 'Invalid Date';
            }
            
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
            const weekday = weekdays[date.getDay()];
            return `${year}.${month}.${day} (${weekday})`;
        }

        // 필터 초기화 함수
        function clearFilters() {
            const weekFilter = document.getElementById('weekFilter');
            const managerFilter = document.getElementById('managerFilter');
            const vendorFilter = document.getElementById('vendorFilter');

            // 기존 옵션 제거 (첫 번째 기본 옵션 제외)
            while (weekFilter.options.length > 1) weekFilter.remove(1);
            while (managerFilter.options.length > 1) managerFilter.remove(1);
            while (vendorFilter.options.length > 1) vendorFilter.remove(1);
        }

        // 현재 주차 계산 - 오늘 날짜가 속한 주차 반환
        function getCurrentWeek() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            const todayStr = today.toISOString().split('T')[0];
            const currentWeek = getWeekFromDate(todayStr);
            
            console.log('=== 현재 주차 계산 ===');
            console.log('오늘 날짜:', todayStr);
            console.log('오늘의 주차:', currentWeek);
            
            // 데이터에 현재 주차가 있는지 확인
            const hasCurrentWeek = allSchedules.some(s => s.주 === currentWeek);
            console.log('데이터에 현재 주차 존재 여부:', hasCurrentWeek);
            
            if (hasCurrentWeek) {
                return currentWeek;
            }
            
            // 현재 주차에 스케줄이 없으면 가장 가까운 미래 주차 찾기
            console.log('현재 주차에 스케줄 없음, 가장 가까운 미래 주차 찾기');
            let closestFutureWeek = null;
            let minDiff = Infinity;
            
            for (let schedule of allSchedules) {
                const scheduleDate = new Date(schedule.일자);
                scheduleDate.setHours(0, 0, 0, 0);
                const diff = scheduleDate - today;
                
                // 오늘 이후의 날짜 중 가장 가까운 것
                if (diff >= 0 && diff < minDiff) {
                    minDiff = diff;
                    closestFutureWeek = schedule.주;
                }
            }
            
            if (closestFutureWeek) {
                console.log('가장 가까운 미래 주차:', closestFutureWeek);
                return closestFutureWeek;
            }
            
            // 미래 스케줄도 없으면 가장 가까운 주차 (과거 포함)
            let closestWeek = null;
            minDiff = Infinity;
            
            for (let schedule of allSchedules) {
                const scheduleDate = new Date(schedule.일자);
                const diff = Math.abs(scheduleDate - today);
                
                if (diff < minDiff) {
                    minDiff = diff;
                    closestWeek = schedule.주;
                }
            }
            
            console.log('가장 가까운 주차(과거 포함):', closestWeek);
            return closestWeek;
        }

        // 데이터 초기화
        function initializeData() {
            if (allSchedules.length === 0) {
                return;
            }

            // 필터 초기화
            clearFilters();

            // 주차 필터 채우기
            updateWeekFilter();

            // 담당자 필터 채우기
            const managers = [...new Set(allSchedules
                .filter(s => s.담당자 && s.담당자 !== 'nan' && typeof s.담당자 === 'string')
                .flatMap(s => s.담당자.split(',').map(m => m.trim()))
            )].sort();
            
            const managerFilter = document.getElementById('managerFilter');
            managers.forEach(manager => {
                const option = document.createElement('option');
                option.value = manager;
                option.textContent = manager;
                managerFilter.appendChild(option);
            });

            // 외주 필터 채우기 (고유 외주사만)
            const vendorsSet = new Set();
            allSchedules.forEach(s => {
                if (s.외주 && s.외주 !== 'nan' && typeof s.외주 === 'string') {
                    // 괄호와 숫자 제거하고 외주사 이름만 추출
                    const vendors = s.외주.split(',').map(v => {
                        return v.replace(/\([^)]*\)/g, '').trim().replace(/\n/g, '');
                    });
                    vendors.forEach(v => {
                        if (v && v !== '?' && v !== '외주') {
                            vendorsSet.add(v);
                        }
                    });
                }
            });
            
            const vendors = [...vendorsSet].sort();
            const vendorFilter = document.getElementById('vendorFilter');
            vendors.forEach(vendor => {
                const option = document.createElement('option');
                option.value = vendor;
                option.textContent = vendor;
                vendorFilter.appendChild(option);
            });

            // 필터 이벤트 리스너
            document.getElementById('weekFilter').addEventListener('change', applyFilters);
            managerFilter.addEventListener('change', applyFilters);
            vendorFilter.addEventListener('change', applyFilters);

            applyFilters();
        }

        // 연도에 따라 주차 필터 업데이트
        function updateWeekFilter() {
            const weekFilter = document.getElementById('weekFilter');
            
            // 기존 옵션 제거 (첫 번째 "전체 주차" 제외)
            while (weekFilter.options.length > 1) {
                weekFilter.remove(1);
            }
            
            // 주차 목록 추출 및 정렬
            const weeks = [...new Set(allSchedules.map(s => s.주))].sort((a, b) => {
                const numA = parseInt(a);
                const numB = parseInt(b);
                return numA - numB;
            });
            
            console.log('=== 주차 필터 업데이트 ===');
            console.log('전체 주차 목록:', weeks);
            
            weeks.forEach(week => {
                const option = document.createElement('option');
                option.value = week;
                option.textContent = week;
                weekFilter.appendChild(option);
            });

            // 현재 주차 설정
            const currentWeek = getCurrentWeek();
            console.log('현재 주차:', currentWeek);
            console.log('주차 목록에 포함 여부:', weeks.includes(currentWeek));
            
            if (currentWeek && weeks.includes(currentWeek)) {
                weekFilter.value = currentWeek;
                console.log('주차 필터 설정 완료:', weekFilter.value);
            } else {
                weekFilter.value = '';
                console.log('주차 필터를 전체로 설정');
            }
        }

        // 필터 적용
        function applyFilters() {
            const weekFilter = document.getElementById('weekFilter').value;
            const managerFilter = document.getElementById('managerFilter').value;
            const vendorFilter = document.getElementById('vendorFilter').value;

            filteredSchedules = allSchedules.filter(schedule => {
                // 주차 필터 (주차가 선택되면 해당 주의 모든 스케줄 표시)
                if (weekFilter && schedule.주 !== weekFilter) return false;

                // 담당자 필터 - 정확한 매칭
                if (managerFilter) {
                    const 담당자 = schedule.담당자;
                    // 담당자가 없거나 NaN인 경우 제외
                    if (!담당자 || 담당자 === 'nan' || typeof 담당자 !== 'string') {
                        return false;
                    }
                    // 쉼표로 구분된 담당자 목록에서 정확히 일치하는지 확인
                    const 담당자목록 = 담당자.split(',').map(m => m.trim());
                    if (!담당자목록.includes(managerFilter)) {
                        return false;
                    }
                }

                // 외주 필터 - 정확한 매칭
                if (vendorFilter) {
                    const 외주 = schedule.외주;
                    // 외주가 없거나 NaN인 경우 제외
                    if (!외주 || 외주 === 'nan' || typeof 외주 !== 'string') {
                        return false;
                    }
                    const cleanVendor = 외주.replace(/\([^)]*\)/g, '').replace(/\n/g, '');
                    if (!cleanVendor.includes(vendorFilter)) {
                        return false;
                    }
                }

                return true;
            });

            renderSchedules();
        }

        // 스케줄 렌더링
        function renderSchedules() {
            const grid = document.getElementById('scheduleGrid');
            const weekFilter = document.getElementById('weekFilter').value;
            
            // 금주 일정 계산 (현재 주차의 일정 수)
            const currentWeek = getCurrentWeek();
            const thisWeekSchedules = allSchedules.filter(s => s.주 === currentWeek);
            
            // 통계 업데이트
            document.getElementById('totalCount').textContent = allSchedules.length;
            document.getElementById('weekCount').textContent = thisWeekSchedules.length;

            // 주차 헤더 업데이트
            if (weekFilter) {
                const weekSchedules = filteredSchedules.filter(s => s.주 === weekFilter);
                if (weekSchedules.length > 0) {
                    const dates = weekSchedules.map(s => new Date(s.일자));
                    const minDate = new Date(Math.min(...dates));
                    const maxDate = new Date(Math.max(...dates));
                    document.getElementById('weekTitle').textContent = `${weekFilter} 스케줄`;
                    document.getElementById('weekRange').textContent = 
                        `${formatDate(minDate.toISOString())} ~ ${formatDate(maxDate.toISOString())}`;
                }
            } else {
                document.getElementById('weekTitle').textContent = '전체 스케줄';
                document.getElementById('weekRange').textContent = '';
            }

            if (filteredSchedules.length === 0) {
                grid.innerHTML = `
                    <div class="no-data">
                        <div class="no-data-icon">🔍</div>
                        <div class="no-data-text">조건에 맞는 일정이 없습니다</div>
                    </div>
                `;
                return;
            }

            // 날짜별로 그룹화 및 정렬
            const grouped = {};
            filteredSchedules.forEach(schedule => {
                const date = schedule.일자;
                if (!grouped[date]) grouped[date] = [];
                grouped[date].push(schedule);
            });

            const sortedDates = Object.keys(grouped).sort();
            
            grid.innerHTML = sortedDates.map(date => {
                const schedules = grouped[date];
                return schedules.map(schedule => createScheduleCard(schedule, date)).join('');
            }).join('');

            // 렌더링 완료 후 오늘 날짜로 스크롤
            scrollToToday();
        }

        // 오늘 날짜 카드로 자동 스크롤
        function scrollToToday() {
            // 약간의 지연을 주어 DOM이 완전히 렌더링된 후 스크롤
            setTimeout(() => {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                
                // 로컬 시간대를 사용한 날짜 문자열 생성 (YYYY-MM-DD)
                const year = today.getFullYear();
                const month = String(today.getMonth() + 1).padStart(2, '0');
                const day = String(today.getDate()).padStart(2, '0');
                const todayStr = `${year}-${month}-${day}`;
                
                console.log('=== 자동 스크롤 시작 ===');
                console.log('오늘 날짜:', todayStr);
                
                // 모든 카드 가져오기
                const allCards = document.querySelectorAll('.schedule-card[data-date]');
                
                if (allCards.length === 0) {
                    console.log('카드가 없습니다.');
                    return;
                }
                
                // 1. 오늘 날짜 카드 먼저 찾기
                let targetCard = document.querySelector(`[data-date="${todayStr}"]`);
                
                if (targetCard) {
                    console.log('오늘 날짜 카드 발견');
                } else {
                    console.log('오늘 날짜 카드 없음, 가장 가까운 과거 날짜 찾기');
                    
                    // 2. 가장 가까운 과거 날짜 찾기 (어제, 그제...)
                    let closestPastCard = null;
                    let minDiff = Infinity;
                    
                    allCards.forEach(card => {
                        const cardDateStr = card.getAttribute('data-date');
                        const cardDate = new Date(cardDateStr + 'T00:00:00');
                        const diff = today - cardDate; // 과거는 양수
                        
                        // 오늘 이전의 날짜 중 가장 가까운 것
                        if (diff > 0 && diff < minDiff) {
                            minDiff = diff;
                            closestPastCard = card;
                        }
                    });
                    
                    if (closestPastCard) {
                        targetCard = closestPastCard;
                        const pastDate = targetCard.getAttribute('data-date');
                        console.log('가장 가까운 과거 날짜:', pastDate);
                    } else {
                        // 3. 과거 일정도 없으면 가장 가까운 미래 날짜
                        console.log('과거 일정 없음, 가장 가까운 미래 날짜 찾기');
                        let closestFutureCard = null;
                        minDiff = Infinity;
                        
                        allCards.forEach(card => {
                            const cardDateStr = card.getAttribute('data-date');
                            const cardDate = new Date(cardDateStr + 'T00:00:00');
                            const diff = cardDate - today;
                            
                            // 오늘 이후의 날짜 중 가장 가까운 것
                            if (diff >= 0 && diff < minDiff) {
                                minDiff = diff;
                                closestFutureCard = card;
                            }
                        });
                        
                        targetCard = closestFutureCard || allCards[0];
                        
                        if (targetCard) {
                            const futureDate = targetCard.getAttribute('data-date');
                            console.log('가장 가까운 미래 날짜:', futureDate);
                        }
                    }
                }
                
                if (targetCard) {
                    console.log('스크롤 대상:', targetCard.getAttribute('data-date'));
                    
                    // 부드러운 스크롤
                    targetCard.scrollIntoView({ 
                        behavior: 'smooth', 
                        block: 'start'
                    });
                    
                    // 카드 강조 효과
                    targetCard.style.animation = 'highlight 2s ease-in-out';
                }
            }, 500);
        }

        // 스케줄 카드 생성
        function createScheduleCard(schedule, date) {
            const 구분Badge = schedule.구분 === 'A/S' ? 
                '<span class="badge as">A/S</span>' : 
                '<span class="badge claim">CLAIM</span>';
            
            // 유무상 정보 처리 (다양한 형식 지원)
            let 유무상Badge = '';
            const 유무상Value = schedule.유무상;
            
            if (유무상Value) {
                const 유무상Str = String(유무상Value).trim();
                if (유무상Str.includes('무상') || 유무상Str === '무상') {
                    유무상Badge = '<span class="badge free">무상</span>';
                } else if (유무상Str.includes('유상') || 유무상Str === '유상') {
                    유무상Badge = '<span class="badge paid">유상</span>';
                }
            }

            return `
                <div class="schedule-card" data-date="${date}">
                    <div class="card-header">
                        <div class="card-date">
                            <div class="date-main">${formatDate(schedule.일자)}</div>
                            <div class="date-week">${schedule.주}</div>
                        </div>
                        <div class="card-badges">
                            ${구분Badge}
                            ${유무상Badge}
                        </div>
                    </div>
                    <div class="card-body">
                        ${schedule.조선소_장소 ? `
                        <div class="info-row">
                            <div class="info-label">조선소/장소</div>
                            <div class="info-value highlight">${schedule.조선소_장소}</div>
                        </div>` : ''}
                        
                        ${schedule.호선 ? `
                        <div class="info-row">
                            <div class="info-label">호선</div>
                            <div class="info-value">${schedule.호선}</div>
                        </div>` : ''}
                        
                        ${schedule.장비 ? `
                        <div class="info-row">
                            <div class="info-label">장비</div>
                            <div class="info-value">${schedule.장비}</div>
                        </div>` : ''}
                        
                        ${schedule.검사종류_고객요청사항 ? `
                        <div class="info-row">
                            <div class="info-label">검사종류</div>
                            <div class="info-value">${schedule.검사종류_고객요청사항}</div>
                        </div>` : ''}
                        
                        ${schedule.담당자 && schedule.담당자 !== 'nan' ? `
                        <div class="info-row">
                            <div class="info-label">담당자</div>
                            <div class="info-value highlight">${schedule.담당자}</div>
                        </div>` : ''}
                        
                        ${schedule.외주 && schedule.외주 !== 'nan' ? `
                        <div class="info-row">
                            <div class="info-label">외주</div>
                            <div class="info-value">${schedule.외주}</div>
                        </div>` : ''}
                        
                        ${schedule.차량 && schedule.차량 !== 'nan' ? `
                        <div class="info-row">
                            <div class="info-label">차량</div>
                            <div class="info-value">${schedule.차량}</div>
                        </div>` : ''}
                        
                        ${schedule.출장인원 ? `
                        <div class="info-row">
                            <div class="info-label">출장인원</div>
                            <div class="info-value">${schedule.출장인원}명</div>
                        </div>` : ''}
                        
                        ${schedule.비고 && schedule.비고 !== 'nan' ? `
                        <div class="info-row">
                            <div class="info-label">비고</div>
                            <div class="info-value">${schedule.비고.replace(/\n/g, '<br>')}</div>
                        </div>` : ''}
                    </div>
                </div>
            `;
        }

        // 초기화 - 페이지 로딩 시 자동으로 GitHub에서 파일 로드
        window.addEventListener('DOMContentLoaded', function() {
            document.getElementById('scheduleGrid').innerHTML = `
                <div class="no-data">
                    <div class="no-data-icon">⏳</div>
                    <div class="no-data-text">데이터를 불러오는 중...</div>
                </div>
            `;
            loadExcelFromGitHub();
        });
    </script>
</body>
